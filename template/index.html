<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capgemini | CI/CD Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body {
            background: linear-gradient(135deg, #0070ad 0%, #003057 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .cap-blue { color: #0070ad; }
        .btn-grad {
            background: linear-gradient(to right, #0070ad, #00b0ca);
            transition: 0.3s;
        }
        .btn-grad:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 176, 202, 0.4);
        }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="glass-card w-full max-w-2xl p-8 animate__animated animate__fadeInUp">
        <div class="text-center mb-10">
            <div class="mb-4">
                <i class="fa-solid fa-server fa-3x cap-blue animate__animated animate__pulse animate__infinite"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 tracking-tight">
                Automated CI/CD Portal
            </h1>
            <p class="text-gray-500 mt-2">Capgemini Mac Mini Environment</p>
        </div>

        <form method="POST" action="/submit" class="space-y-4 mb-10">
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                    <i class="fa-solid fa-pen-nib text-gray-400"></i>
                </span>
                <input type="text" name="message" 
                    class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none transition-all" 
                    placeholder="Enter message for database..." required>
            </div>
            
            <button type="submit" class="btn-grad w-full text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                Save to Database
            </button>
        </form>

        <hr class="border-gray-200 mb-8">

        <div>
            <h2 class="text-xl font-semibold text-gray-700 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-database cap-blue"></i>
                Database Records
            </h2>
            
            <ul class="space-y-2">
                {% for msg in messages %}
                <li class="flex items-center p-3 bg-gray-50 rounded-md border-l-4 border-blue-500 animate__animated animate__fadeInLeft">
                    <i class="fa-solid fa-circle-check text-green-500 mr-3 text-sm"></i>
                    <span class="text-gray-700">{{ msg[1] }}</span>
                </li>
                {% else %}
                <li class="text-gray-400 italic text-center py-4">No records found yet.</li>
                {% endfor %}
            </ul>
        </div>
        
        <div class="mt-10 text-center">
            <span class="text-xs text-gray-400 uppercase tracking-widest flex items-center justify-center gap-2">
                <i class="fa-brands fa-apple"></i> Optimized for Mac Mini CI/CD
            </span>
        </div>
    </div>

</body>
</html>
